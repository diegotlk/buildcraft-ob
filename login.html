<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Entrar ou criar conta no Binaryzando.">
  <title>Entrar | Binaryzando</title>

  <link rel="icon" type="image/png" href="img/favicon-512.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">

  <link rel="stylesheet" href="css/global.css?v=2">
  <link rel="stylesheet" href="css/cards.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/pages.css?v=2">

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 40px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 36px 32px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo-img {
      height: 96px;
      width: auto;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-input);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .2s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-switch {
      text-align: center;
      margin-top: 18px;
      font-size: .82rem;
      color: var(--text-secondary);
    }
    .auth-switch a {
      color: var(--accent-hover);
      font-weight: 600;
      cursor: pointer;
    }

    .auth-back {
      text-align: center;
      margin-top: 14px;
    }
    .auth-back a {
      font-size: .8rem;
      color: var(--text-muted);
    }
    .auth-back a:hover {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">
      <img src="img/logo-wordmark.png" alt="Binaryzando" class="navbar-logo">
    </a>
  </nav>

  <!-- ==================== AUTH ==================== -->
  <div class="auth-wrap">
    <div class="glass-card auth-card">
      <div class="auth-logo">
        <img src="img/logo-full.png" alt="Binaryzando" class="auth-logo-img">
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-entrar" onclick="trocarAbaAuth('entrar')">Entrar</div>
        <div class="auth-tab" id="tab-cadastro" onclick="trocarAbaAuth('cadastro')">Criar Conta</div>
      </div>

      <div class="auth-error" id="auth-error"></div>

      <form id="auth-form" onsubmit="enviarAuth(event)">
        <div class="form-group">
          <label class="form-label" for="auth-email">E-mail</label>
          <input type="email" id="auth-email" class="form-input" placeholder="seu@email.com"
                 autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="auth-senha">Senha</label>
          <input type="password" id="auth-senha" class="form-input" placeholder="••••••••"
                 autocomplete="current-password" minlength="8" required
                 oninput="atualizarRequisitos()">
        </div>

        <div class="auth-reqs" id="auth-reqs">
          <div class="auth-reqs-titulo">Sua senha precisa ter:</div>
          <div class="auth-req" id="req-tamanho"><span class="icone">○</span> Pelo menos 8 caracteres</div>
          <div class="auth-req" id="req-maiuscula"><span class="icone">○</span> Uma letra maiúscula (A-Z)</div>
          <div class="auth-req" id="req-minuscula"><span class="icone">○</span> Uma letra minúscula (a-z)</div>
          <div class="auth-req" id="req-numero"><span class="icone">○</span> Um número (0-9)</div>
          <div class="auth-req" id="req-especial"><span class="icone">○</span> Um caractere especial (!@#$%...)</div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="auth-submit" style="width:100%; margin-top:8px;">
          Entrar
        </button>
      </form>

      <!-- Esqueci minha senha (só faz sentido na aba "Entrar") -->
      <div class="auth-switch" id="auth-forgot" style="margin-top:14px">
        <a onclick="abrirEsqueci()">Esqueci minha senha</a>
      </div>

      <div id="esqueci-box" style="display:none; margin-top:8px;">
        <div class="form-group">
          <label class="form-label" for="esqueci-email">Seu e-mail</label>
          <input type="email" id="esqueci-email" class="form-input" placeholder="seu@email.com" autocomplete="username">
        </div>
        <button type="button" class="btn btn-outline" style="width:100%" id="esqueci-btn" onclick="enviarEsqueci()">Enviar link de redefinição</button>
        <div id="esqueci-msg" style="font-size:.82rem;color:var(--text-secondary);margin-top:10px;text-align:center;"></div>
      </div>

      <div class="auth-switch">
        <span id="auth-switch-texto">Não tem conta?</span>
        <a id="auth-switch-link" onclick="trocarAbaAuth('cadastro')">Criar uma agora</a>
      </div>

      <div class="auth-back">
        <a href="index.html">⬅ Voltar para o início</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js?v=5"></script>
  <script>
    let abaAuthAtual = 'entrar';

    function trocarAbaAuth(aba) {
      abaAuthAtual = aba;
      document.getElementById('tab-entrar').classList.toggle('active', aba === 'entrar');
      document.getElementById('tab-cadastro').classList.toggle('active', aba === 'cadastro');
      document.getElementById('auth-submit').textContent = aba === 'entrar' ? 'Entrar' : 'Criar Conta';
      document.getElementById('auth-senha').setAttribute('autocomplete', aba === 'entrar' ? 'current-password' : 'new-password');

      if (aba === 'entrar') {
        document.getElementById('auth-switch-texto').textContent = 'Não tem conta?';
        document.getElementById('auth-switch-link').textContent = 'Criar uma agora';
        document.getElementById('auth-switch-link').onclick = () => trocarAbaAuth('cadastro');
      } else {
        document.getElementById('auth-switch-texto').textContent = 'Já tem conta?';
        document.getElementById('auth-switch-link').textContent = 'Entrar';
        document.getElementById('auth-switch-link').onclick = () => trocarAbaAuth('entrar');
      }

      // O checklist de força só faz sentido ao criar a conta. No login, a senha
      // já existe — exigir as regras ali só atrapalharia quem tem senha antiga.
      document.getElementById('auth-reqs').classList.toggle('show', aba === 'cadastro');
      if (aba === 'cadastro') atualizarRequisitos();

      esconderErroAuth();
    }

    // regrasSenha/senhaForte vêm de js/auth.js (única fonte da política de
    // senha no front, reaproveitada também no modal "Mudar senha").
    function atualizarRequisitos() {
      aplicarChecklistSenha(document.getElementById('auth-senha').value, (c) => 'req-' + c);
    }

    function mostrarErroAuth(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function esconderErroAuth() {
      document.getElementById('auth-error').style.display = 'none';
    }

    function redirecionarPosLogin() {
      const params = new URLSearchParams(location.search);
      const destino = params.get('redirect');
      const paginasValidas = ['criar_estrategia.html', 'inventario.html', 'index.html', 'planos.html'];
      window.location.href = (destino && paginasValidas.includes(destino)) ? destino : 'criar_estrategia.html';
    }

    async function enviarAuth(event) {
      event.preventDefault();
      esconderErroAuth();

      const email = document.getElementById('auth-email').value.trim();
      const senha = document.getElementById('auth-senha').value;
      const endpoint = abaAuthAtual === 'entrar' ? '/api/auth/login' : '/api/auth/cadastro';

      // Ao criar conta, segura aqui antes de chamar a API (o servidor também
      // valida — isto é só pra dar um aviso rápido e claro ao usuário).
      if (abaAuthAtual === 'cadastro' && !senhaForte(senha)) {
        mostrarErroAuth('Sua senha ainda não cumpre todos os requisitos abaixo.');
        return;
      }

      const btn = document.getElementById('auth-submit');
      const textoOriginal = btn.textContent;
      btn.disabled = true;
      btn.textContent = abaAuthAtual === 'entrar' ? 'Entrando...' : 'Criando conta...';

      try {
        const resp = await fetch(AUTH_API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        const dados = await resp.json();

        if (!resp.ok || !dados.success) {
          mostrarErroAuth(dados.message || 'Não foi possível continuar. Tente de novo.');
          btn.disabled = false;
          btn.textContent = textoOriginal;
          return;
        }

        salvarSessao(dados.token, dados.email, dados.plano || 'free');
        redirecionarPosLogin();
      } catch (e) {
        mostrarErroAuth('Não foi possível conectar à API. Verifique se o backend (backtest_api.py) está rodando.');
        btn.disabled = false;
        btn.textContent = textoOriginal;
      }
    }

    function abrirEsqueci() {
      const box = document.getElementById('esqueci-box');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
      if (box.style.display === 'block') {
        // Aproveita o e-mail já digitado no formulário, se houver.
        const emailDigitado = document.getElementById('auth-email').value.trim();
        if (emailDigitado) document.getElementById('esqueci-email').value = emailDigitado;
        document.getElementById('esqueci-email').focus();
      }
    }

    async function enviarEsqueci() {
      const email = document.getElementById('esqueci-email').value.trim();
      const msg = document.getElementById('esqueci-msg');
      const btn = document.getElementById('esqueci-btn');
      if (!email || !email.includes('@')) {
        msg.style.color = 'var(--danger)';
        msg.textContent = 'Digite um e-mail válido.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const resp = await fetch(AUTH_API_BASE + '/api/auth/esqueci', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const dados = await resp.json();
        msg.style.color = 'var(--text-secondary)';
        // Resposta neutra de propósito (não revela se o e-mail existe).
        msg.textContent = dados.message || 'Se este e-mail estiver cadastrado, enviamos um link.';
      } catch (e) {
        msg.style.color = 'var(--danger)';
        msg.textContent = 'Não foi possível conectar à API.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar link de redefinição';
      }
    }

    // Já logado? Não tem motivo pra ver a tela de login.
    if (estaLogado()) {
      redirecionarPosLogin();
    }
  </script>
</body>
</html>
