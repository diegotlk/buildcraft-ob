<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Entrar ou criar conta no Binaryzando.">
  <title>Entrar | Binaryzando</title>

  <link rel="icon" type="image/png" href="img/favicon-512.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">

  <link rel="stylesheet" href="css/global.css?v=7">
  <link rel="stylesheet" href="css/cards.css?v=9">
  <link rel="stylesheet" href="css/components.css?v=5">
  <link rel="stylesheet" href="css/pages.css?v=6">

  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 40px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 36px 32px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo-img {
      height: 96px;
      width: auto;
      margin: 0 auto;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-input);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 9px 0;
      text-align: center;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .2s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: #000;
    }

    .auth-switch {
      text-align: center;
      margin-top: 18px;
      font-size: .82rem;
      color: var(--text-secondary);
    }
    .auth-switch a {
      color: var(--accent-hover);
      font-weight: 600;
      cursor: pointer;
    }

    .auth-back {
      text-align: center;
      margin-top: 14px;
    }
    .auth-back a {
      font-size: .8rem;
      color: var(--text-muted);
    }
    .auth-back a:hover {
      color: var(--text-secondary);
    }

    .auth-lembrar {
      display: flex; align-items: center; gap: 8px;
      margin-top: 4px; margin-bottom: 4px;
      font-size: .82rem; color: var(--text-secondary);
      cursor: pointer; user-select: none;
    }
    .auth-lembrar input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  </style>
</head>
<body>

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">
      <img src="img/logo-wordmark.png" alt="Binaryzando" class="navbar-logo">
    </a>
  </nav>

  <!-- ==================== AUTH ==================== -->
  <div class="auth-wrap">
    <div class="glass-card auth-card">
      <div class="auth-logo">
        <img src="img/logo-login.png" alt="Binaryzando" class="auth-logo-img">
      </div>

      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-entrar" onclick="trocarAbaAuth('entrar')" data-i18n="auth.entrar">Entrar</div>
        <div class="auth-tab" id="tab-cadastro" onclick="trocarAbaAuth('cadastro')" data-i18n="auth.criarconta">Criar Conta</div>
      </div>

      <div class="auth-error" id="auth-error"></div>

      <form id="auth-form" onsubmit="enviarAuth(event)">
        <div class="form-group">
          <label class="form-label" for="auth-email" data-i18n="auth.email">E-mail</label>
          <input type="email" id="auth-email" class="form-input" placeholder="seu@email.com"
                 autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="auth-senha" data-i18n="auth.senha">Senha</label>
          <div class="auth-senha-wrap">
            <input type="password" id="auth-senha" class="form-input" placeholder="••••••••"
                   autocomplete="current-password" minlength="8" required
                   oninput="atualizarRequisitos()">
            <button type="button" class="auth-senha-toggle"
                    onclick="alternarVisibilidadeSenha('auth-senha', this)" aria-label="Mostrar senha" title="Mostrar senha"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>

        <label class="auth-lembrar">
          <input type="checkbox" id="auth-lembrar" checked>
          <span data-i18n="auth.lembrar">Lembrar de mim</span>
        </label>

        <label class="auth-lembrar auth-confirma" id="auth-confirma-wrap" style="display:none; align-items:flex-start; line-height:1.4;">
          <input type="checkbox" id="auth-confirma" style="margin-top:3px;">
          <span data-i18n-html="auth.confirmoidade">Confirmo que tenho <strong>18 anos ou mais</strong> e li e concordo com os <a href="termos.html" target="_blank" style="color:var(--accent-hover)">Termos de Uso</a>, a <a href="privacidade.html" target="_blank" style="color:var(--accent-hover)">Política de Privacidade</a> e o <a href="aviso-risco.html" target="_blank" style="color:var(--accent-hover)">Aviso de Risco</a>.</span>
        </label>

        <div class="auth-reqs" id="auth-reqs">
          <div class="auth-reqs-titulo" data-i18n="auth.senhaprecisa">Sua senha precisa ter:</div>
          <div class="auth-req" id="req-tamanho"><span class="icone">○</span> <span data-i18n="auth.req.tamanho">Pelo menos 8 caracteres</span></div>
          <div class="auth-req" id="req-maiuscula"><span class="icone">○</span> <span data-i18n="auth.req.maiuscula">Uma letra maiúscula (A-Z)</span></div>
          <div class="auth-req" id="req-minuscula"><span class="icone">○</span> <span data-i18n="auth.req.minuscula">Uma letra minúscula (a-z)</span></div>
          <div class="auth-req" id="req-numero"><span class="icone">○</span> <span data-i18n="auth.req.numero">Um número (0-9)</span></div>
          <div class="auth-req" id="req-especial"><span class="icone">○</span> <span data-i18n="auth.req.especial">Um caractere especial (!@#$%...)</span></div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="auth-submit" style="width:100%; margin-top:8px;" data-i18n="auth.entrar">
          Entrar
        </button>
      </form>

      <!-- Esqueci minha senha (só faz sentido na aba "Entrar") -->
      <div class="auth-switch" id="auth-forgot" style="margin-top:14px">
        <a onclick="abrirEsqueci()" data-i18n="auth.esquecisenha">Esqueci minha senha</a>
      </div>

      <div id="esqueci-box" style="display:none; margin-top:8px;">
        <div class="form-group">
          <label class="form-label" for="esqueci-email" data-i18n="auth.seuemail">Seu e-mail</label>
          <input type="email" id="esqueci-email" class="form-input" placeholder="seu@email.com" autocomplete="username">
        </div>
        <button type="button" class="btn btn-outline" style="width:100%" id="esqueci-btn" onclick="enviarEsqueci()" data-i18n="auth.enviarlink">Enviar link de redefinição</button>
        <div id="esqueci-msg" style="font-size:.82rem;color:var(--text-secondary);margin-top:10px;text-align:center;"></div>
      </div>

      <div class="auth-switch">
        <span id="auth-switch-texto" data-i18n="auth.naotemconta">Não tem conta?</span>
        <a id="auth-switch-link" onclick="trocarAbaAuth('cadastro')" data-i18n="auth.criaruma">Criar uma agora</a>
      </div>

      <div class="auth-back">
        <a href="index.html" data-i18n="auth.voltarinicio">⬅ Voltar para o início</a>
      </div>
    </div>
  </div>

  <script src="js/sound.js?v=6"></script>
  <script src="js/auth.js?v=15"></script>
  <script src="js/i18n.js?v=4"></script>
  <script>
    let abaAuthAtual = 'entrar';

    function trocarAbaAuth(aba) {
      abaAuthAtual = aba;
      document.getElementById('tab-entrar').classList.toggle('active', aba === 'entrar');
      document.getElementById('tab-cadastro').classList.toggle('active', aba === 'cadastro');
      document.getElementById('auth-submit').textContent = aba === 'entrar' ? t('auth.entrar') : t('auth.criarconta');
      document.getElementById('auth-senha').setAttribute('autocomplete', aba === 'entrar' ? 'current-password' : 'new-password');

      if (aba === 'entrar') {
        document.getElementById('auth-switch-texto').textContent = t('auth.naotemconta');
        document.getElementById('auth-switch-link').textContent = t('auth.criaruma');
        document.getElementById('auth-switch-link').onclick = () => trocarAbaAuth('cadastro');
      } else {
        document.getElementById('auth-switch-texto').textContent = t('auth.jatemconta');
        document.getElementById('auth-switch-link').textContent = t('auth.entrar');
        document.getElementById('auth-switch-link').onclick = () => trocarAbaAuth('entrar');
      }

      // O checklist de força só faz sentido ao criar a conta. No login, a senha
      // já existe — exigir as regras ali só atrapalharia quem tem senha antiga.
      document.getElementById('auth-reqs').classList.toggle('show', aba === 'cadastro');
      if (aba === 'cadastro') atualizarRequisitos();

      document.getElementById('auth-confirma-wrap').style.display = (aba === 'cadastro') ? 'flex' : 'none';
      if (aba !== 'cadastro') document.getElementById('auth-confirma').checked = false;

      esconderErroAuth();
    }

    // regrasSenha/senhaForte vêm de js/auth.js (única fonte da política de
    // senha no front, reaproveitada também no modal "Mudar senha").
    function atualizarRequisitos() {
      aplicarChecklistSenha(document.getElementById('auth-senha').value, (c) => 'req-' + c);
    }

    function mostrarErroAuth(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function esconderErroAuth() {
      document.getElementById('auth-error').style.display = 'none';
    }

    function redirecionarPosLogin() {
      const params = new URLSearchParams(location.search);
      const destino = params.get('redirect');
      const paginasValidas = ['criar_estrategia.html', 'inventario.html', 'index.html', 'planos.html'];
      window.location.href = (destino && paginasValidas.includes(destino)) ? destino : 'criar_estrategia.html';
    }

    async function enviarAuth(event) {
      event.preventDefault();
      esconderErroAuth();

      const email = document.getElementById('auth-email').value.trim();
      const senha = document.getElementById('auth-senha').value;
      const endpoint = abaAuthAtual === 'entrar' ? '/api/auth/login' : '/api/auth/cadastro';

      // Ao criar conta, segura aqui antes de chamar a API (o servidor também
      // valida — isto é só pra dar um aviso rápido e claro ao usuário).
      if (abaAuthAtual === 'cadastro' && !senhaForte(senha)) {
        mostrarErroAuth(t('auth.erro.senhafraca'));
        return;
      }

      if (abaAuthAtual === 'cadastro' && !document.getElementById('auth-confirma').checked) {
        mostrarErroAuth(t('auth.erro.semconfirmacao'));
        return;
      }

      const btn = document.getElementById('auth-submit');
      const textoOriginal = btn.textContent;
      btn.disabled = true;
      btn.textContent = abaAuthAtual === 'entrar' ? t('auth.entrando') : t('auth.criandoconta');

      try {
        const resp = await fetch(AUTH_API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        const dados = await resp.json();

        if (!resp.ok || !dados.success) {
          mostrarErroAuth(dados.message || t('auth.erro.generico'));
          btn.disabled = false;
          btn.textContent = textoOriginal;
          return;
        }

        const lembrar = document.getElementById('auth-lembrar')?.checked !== false;
        salvarSessao(dados.token, dados.email, dados.plano || 'free', lembrar);
        redirecionarPosLogin();
      } catch (e) {
        mostrarErroAuth(t('auth.erro.apioffline'));
        btn.disabled = false;
        btn.textContent = textoOriginal;
      }
    }

    function abrirEsqueci() {
      const box = document.getElementById('esqueci-box');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
      if (box.style.display === 'block') {
        // Aproveita o e-mail já digitado no formulário, se houver.
        const emailDigitado = document.getElementById('auth-email').value.trim();
        if (emailDigitado) document.getElementById('esqueci-email').value = emailDigitado;
        document.getElementById('esqueci-email').focus();
      }
    }

    async function enviarEsqueci() {
      const email = document.getElementById('esqueci-email').value.trim();
      const msg = document.getElementById('esqueci-msg');
      const btn = document.getElementById('esqueci-btn');
      if (!email || !email.includes('@')) {
        msg.style.color = 'var(--danger)';
        msg.textContent = t('auth.erro.emailinvalido');
        return;
      }
      btn.disabled = true;
      btn.textContent = t('auth.enviando');
      try {
        const resp = await fetch(AUTH_API_BASE + '/api/auth/esqueci', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const dados = await resp.json();
        msg.style.color = 'var(--text-secondary)';
        // Resposta neutra de propósito (não revela se o e-mail existe).
        msg.textContent = dados.message || t('auth.linkenviado');
      } catch (e) {
        msg.style.color = 'var(--danger)';
        msg.textContent = t('auth.erro.apioffline2');
      } finally {
        btn.disabled = false;
        btn.textContent = t('auth.enviarlink');
      }
    }

    // Já logado? Não tem motivo pra ver a tela de login.
    if (estaLogado()) {
      redirecionarPosLogin();
    }
  </script>
</body>
</html>
