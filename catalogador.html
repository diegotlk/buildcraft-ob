<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catalogador — veja as últimas velas reais de cada par, coloridas por resultado.">
  <title>Catalogador | Binaryzando</title>

  <link rel="icon" type="image/png" href="img/favicon-512.png">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">

  <link rel="stylesheet" href="css/global.css?v=5">
  <link rel="stylesheet" href="css/components.css?v=5">
  <link rel="stylesheet" href="css/pages.css?v=5">

  <style>
    /* Grade do Catalogador — célula colorida por vela, igual a parede de
       tijolos do Catalogador OB (verde/vermelha/cinza-doji). */
    .cat-totais {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
      margin: 20px 0 28px;
    }
    .cat-totais .cat-total-item {
      background: var(--bg-card); border: 1px solid var(--bg-hover);
      border-radius: var(--radius-lg, 12px); padding: 10px 18px;
      text-align: center; min-width: 110px;
    }
    .cat-total-item .num { font-size: 1.4rem; font-weight: 800; display: block; }
    .cat-total-item .lbl { font-size: .72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
    .cat-total-item.verde .num    { color: #1ee08a; }
    .cat-total-item.vermelha .num { color: #ff4d6d; }
    .cat-total-item.doji .num     { color: var(--text-muted); }

    .cat-grade {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      gap: 6px;
      margin-bottom: 28px;
    }
    .cat-vela {
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      font-size: .72rem;
      font-weight: 700;
      font-family: var(--font-mono, monospace);
      color: #fff;
      opacity: 0;
      transform: scale(.85);
      animation: catVelaIn .25s ease forwards;
    }
    @keyframes catVelaIn { to { opacity: 1; transform: scale(1); } }
    .cat-vela.verde    { background: linear-gradient(135deg, #1ee08a, #14a866); box-shadow: 0 0 10px rgba(30,224,138,.25); }
    .cat-vela.vermelha { background: linear-gradient(135deg, #ff4d6d, #c81e3e); box-shadow: 0 0 10px rgba(255,77,109,.25); }
    .cat-vela.doji     { background: var(--bg-hover); color: var(--text-secondary); box-shadow: none; }

    /* Período com muitas velas (semana): célula menor que a do dia, mas o
       horário continua escrito DENTRO dela — sem isso vira só pontinho
       colorido sem sentido. Só corta sombra/animação (custaria caro em
       milhares de células) e o padding, não o texto. */
    .cat-grade.cat-grade-densa {
      grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
      gap: 3px;
    }
    .cat-grade.cat-grade-densa .cat-vela {
      padding: 3px 1px; font-size: .56rem; border-radius: 4px;
      box-shadow: none; animation: none; opacity: 1; transform: none;
    }

    .cat-controles {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      justify-content: center; margin-bottom: 8px;
    }
    .cat-controles select, .cat-controles input[type="date"] {
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--bg-hover); border-radius: var(--radius-md, 8px);
      padding: 8px 12px; font-size: .85rem;
    }
    .cat-estado {
      text-align: center; color: var(--text-secondary); padding: 40px 0;
    }

    /* Modo "horas" (semana/mês): célula maior, mostra a hora e a % do lado
       verde/vermelho dominante daquele horário ao longo do período. */
    .cat-vela.cat-vela-hora {
      padding: 14px 6px;
      font-size: .8rem;
      line-height: 1.3;
    }
    .cat-vela-hora .cat-vela-pct { display: block; font-size: .68rem; opacity: .85; font-weight: 600; }
    .cat-aviso-premium {
      text-align: center; color: var(--neon-gold, #ffc24b); font-size: .8rem;
      margin-top: -4px; margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="main-content">
    <div class="container">
      <div class="lab-header" style="margin-top: 40px; margin-bottom: 28px;">
        <h1 class="page-title">🔥 Catalogador</h1>
        <p class="page-subtitle">Escolha um par e um período (dia, semana ou mês). Cada vela real do período aparece colorida — verde, vermelha ou cinza (doji/sem definição).</p>
      </div>

      <div class="cat-controles">
        <select id="cat-par"></select>
        <select id="cat-tf">
          <option value="M1" selected>M1 (1 min)</option>
          <option value="M5">M5 (5 min)</option>
          <option value="M15">M15 (15 min)</option>
        </select>
        <select id="cat-periodo" onchange="aoTrocarPeriodoCatalogador()">
          <option value="dia" selected>1 dia</option>
          <option value="semana">1 semana</option>
          <option value="mes">1 mês 🔒</option>
        </select>
        <input type="date" id="cat-data">
        <button class="btn btn-sm btn-accent" onclick="carregarCatalogador()">🔄 Atualizar</button>
      </div>
      <p id="cat-aviso-premium" class="cat-aviso-premium" style="display:none">🔒 Período de 1 mês é exclusivo Premium.</p>

      <div id="cat-totais" class="cat-totais"></div>
      <div id="cat-grade" class="cat-grade"></div>
      <div id="cat-estado" class="cat-estado"></div>
    </div>
