<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8d0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#f0c040" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b8860b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Halo externo -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#f0c040" stroke-width="1.5" opacity="0.35"/>
  <!-- Fundo escuro dourado -->
  <circle cx="50" cy="50" r="44" fill="#1c1000"/>
  <!-- Glow interno -->
  <circle cx="50" cy="50" r="40" fill="url(#glow)" opacity="0.25"/>
  <!-- Estrela de 8 pontas -->
  <g filter="url(#blur-glow)" opacity="0.6">
    <polygon points="50,14 53.5,38 74,22 60,42 86,44 64,54 78,74 54,62 56,88 50,66 44,88 46,62 22,74 36,54 14,44 40,42 26,22 46,38" fill="#f0c040"/>
  </g>
  <!-- Estrela de 8 pontas (sólida) -->
  <polygon points="50,18 53,38 70,24 58,42 82,44 62,53 74,70 52,60 54,84 50,64 46,84 48,60 26,70 38,53 18,44 42,42 30,24 47,38" fill="#f0c040" opacity="0.95"/>
  <!-- Letra G no centro -->
  <text x="50" y="56" text-anchor="middle" font-family="'Orbitron',sans-serif" font-size="22" font-weight="900" fill="#1c1000" letter-spacing="-1">G</text>
  <!-- Brilho no G -->
  <text x="50" y="55.5" text-anchor="middle" font-family="'Orbitron',sans-serif" font-size="22" font-weight="900" fill="#fff8d0" opacity="0.3" letter-spacing="-1">G</text>
</svg>
